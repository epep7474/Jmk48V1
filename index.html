<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Token Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #080c10;
      color: #e0e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.035) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 25s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,100,255,0.1) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridShift {
      0% { transform: translate(0,0); }
      100% { transform: translate(40px,40px); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 410px;
      padding: 20px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 26px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,240,255,0.45);
      box-shadow:
        0 0 0 5px rgba(0,240,255,0.08),
        0 0 28px rgba(0,240,255,0.35),
        0 0 60px rgba(0,110,255,0.2);
      animation: logoPulse 3.5s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 0 5px rgba(0,240,255,0.08), 0 0 28px rgba(0,240,255,0.35), 0 0 60px rgba(0,110,255,0.2); }
      50%      { box-shadow: 0 0 0 7px rgba(0,240,255,0.13), 0 0 45px rgba(0,240,255,0.55), 0 0 85px rgba(0,110,255,0.3); }
    }

    .logo-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 5px;
      color: rgba(0,240,255,0.6);
      margin-top: 14px;
      text-transform: uppercase;
    }

    .panel {
      background: rgba(8,16,26,0.92);
      border: 1px solid rgba(0,240,255,0.12);
      border-radius: 18px;
      padding: 30px 26px;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(0,240,255,0.07);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      color: #00f0ff;
      text-align: center;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: rgba(0,240,255,0.55);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 13px 15px;
      background: rgba(0,240,255,0.04);
      border: 1px solid rgba(0,240,255,0.14);
      border-radius: 10px;
      color: #e0e8f0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: rgba(0,240,255,0.45);
      box-shadow: 0 0 0 3px rgba(0,240,255,0.07);
    }

    .field input::placeholder { color: rgba(255,255,255,0.18); }

    .field input.mono {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      background: linear-gradient(135deg, #00d4ff 0%, #006eff 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2.5px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 22px rgba(0,110,255,0.35);
    }
    .btn:hover { opacity: 0.88; box-shadow: 0 4px 32px rgba(0,110,255,0.55); }
    .btn:active { transform: scale(0.98); }

    .status {
      display: none;
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(0,240,255,0.05);
      border-left: 3px solid rgba(0,240,255,0.35);
      color: rgba(255,255,255,0.65);
      transition: all 0.3s;
    }
    .status.show { display: block; }
    .status.ok  { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.05); }
    .status.err { border-color: #ff4466; color: #ff4466; background: rgba(255,68,102,0.05); }

    /* Top-right user badge */
    .user-badge {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
    }

    .badge-btn {
      background: rgba(0,240,255,0.07);
      border: 1px solid rgba(0,240,255,0.18);
      border-radius: 8px;
      color: #00f0ff;
      padding: 7px 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 1.5px;
      transition: background 0.2s;
    }
    .badge-btn:hover { background: rgba(0,240,255,0.13); }

    .badge-info {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: rgba(8,16,26,0.97);
      border: 1px solid rgba(0,240,255,0.18);
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 175px;
      font-size: 13px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.6);
    }
    .badge-info div { margin-bottom: 7px; color: rgba(255,255,255,0.5); }
    .badge-info span { color: #00f0ff; font-weight: 600; }
    .badge-info .out-btn {
      margin-top: 10px;
      padding: 8px;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .hidden { display: none !important; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

  <div class="user-badge hidden" id="userBadge">
    <button class="badge-btn" onclick="toggleBadge()">● ONLINE</button>
    <div class="badge-info hidden" id="badgeInfo">
      <div>Role: <span>Owner</span></div>
      <div>Status: <span>Lifetime</span></div>
      <button class="btn out-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <div class="wrapper">
    <div class="logo-wrap">
      <img src="https://files.catbox.moe/8yjz63.png" class="logo-img" alt="logo">
      <div class="logo-title">Token Manager</div>
    </div>

    <!-- LOGIN -->
    <div class="panel" id="loginPanel">
      <div class="panel-title">Login</div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="uInput" placeholder="username" autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pInput" placeholder="password">
      </div>
      <button class="btn" onclick="doLogin()">MASUK</button>
    </div>

    <!-- DASHBOARD -->
    <div class="panel hidden" id="dashPanel">
      <div class="panel-title">Tambah Token</div>
      <div class="field">
        <label>Telegram Bot Token</label>
        <input type="text" id="tokenInput" class="mono" placeholder="123456:ABCdef...">
      </div>
      <button class="btn" onclick="addToken()">TAMBAHKAN</button>
      <div class="status" id="status"></div>
    </div>

    <div class="footer">— XxX —</div>
  </div>

<script>
  const GITHUB_TOKEN = "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";
  const GITHUB_OWNER = "epep7474";
  const GITHUB_REPO  = "Jmk48V1";
  const FILE_PATH    = "token.json";

  const _c = [109,97,109,97,110];
  const _d = [107,117,99,105,110,103,116,97,105];
  let _ok = false;

  function _chk(u, p) {
    return u === String.fromCharCode(..._c) && p === String.fromCharCode(..._d);
  }

  function doLogin() {
    const u = document.getElementById("uInput").value.trim();
    const p = document.getElementById("pInput").value.trim();
    if (!u || !p) { alert("Isi semua field."); return; }
    if (!_chk(u, p)) { alert("Username atau password salah."); return; }
    _ok = true;
    document.getElementById("loginPanel").classList.add("hidden");
    document.getElementById("dashPanel").classList.remove("hidden");
    document.getElementById("userBadge").classList.remove("hidden");
  }

  function toggleBadge() {
    document.getElementById("badgeInfo").classList.toggle("hidden");
  }

  function logout() {
    _ok = false;
    ["dashPanel","userBadge"].forEach(id => document.getElementById(id).classList.add("hidden"));
    document.getElementById("loginPanel").classList.remove("hidden");
    ["uInput","pInput","tokenInput"].forEach(id => document.getElementById(id).value = "");
    setStatus("","");
  }

  async function addToken() {
    if (!_ok) return;
    const tok = document.getElementById("tokenInput").value.trim();
    if (!tok) { setStatus("❌ Token tidak boleh kosong.", "err"); return; }
    if (!tok.includes(":")) { setStatus("❌ Format token tidak valid.", "err"); return; }

    setStatus("⏳ Menyimpan...", "");

    try {
      const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
      const res  = await fetch(url, { headers: { Authorization: `Bearer ${GITHUB_TOKEN}` } });

      let data = { tokens: [] };
      let sha  = null;

      if (res.ok) {
        const j = await res.json();
        sha  = j.sha;
        data = JSON.parse(atob(j.content.replace(/\n/g,"")));
        if (!data.tokens) data.tokens = [];
      }

      if (data.tokens.includes(tok)) { setStatus("⚠️ Token sudah ada.", "err"); return; }

      data.tokens.push(tok);

      const body = { message: "add token", content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))) };
      if (sha) body.sha = sha;

      const put = await fetch(url, {
        method: "PUT",
        headers: { Authorization: `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (put.ok) {
        setStatus("✅ Token berhasil ditambahkan!", "ok");
        document.getElementById("tokenInput").value = "";
      } else {
        const e = await put.json();
        setStatus("❌ Gagal: " + (e.message || "Error"), "err");
      }
    } catch(e) {
      setStatus("❌ Error: " + e.message, "err");
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = "status" + (msg ? " show" : "") + (type ? " "+type : "");
  }

  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    if (!document.getElementById("loginPanel").classList.contains("hidden")) doLogin();
    else if (!document.getElementById("dashPanel").classList.contains("hidden")) addToken();
  });
</script>
</body>
</html>
